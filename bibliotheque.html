<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque — TikTok Auto-Montage</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; padding: 2rem; }
a.back { color: #aaa; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1.5rem; }
a.back:hover { color: #fff; }
h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
.section { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.section h2 { font-size: 1rem; margin-bottom: 1rem; color: #ccc; }
.form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
input[type=text], input[type=file] { background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 0.6rem 0.9rem; color: #fff; font-size: 0.9rem; flex: 1; min-width: 180px; }
input[type=file] { padding: 0.5rem; cursor: pointer; }
select { background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 0.6rem 0.9rem; color: #fff; font-size: 0.9rem; }
button { background: #1DB954; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; color: #fff; font-size: 0.9rem; cursor: pointer; white-space: nowrap; }
button:hover { background: #17a349; }
button.danger { background: #c0392b; }
button.danger:hover { background: #a93226; }
.list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
.item { display: flex; align-items: center; justify-content: space-between; gap: 1rem; background: #2a2a2a; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; }
.item .name { font-weight: 500; flex: 1; }
.tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.tag { background: #1a3a2a; color: #1DB954; border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; }
.tag.sound { background: #1a2a3a; color: #4a9eff; }
.empty { color: #666; font-size: 0.85rem; text-align: center; padding: 1rem; }
.msg { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
.msg.success { background: #1a3a2a; color: #1DB954; border: 1px solid #1DB954; }
.msg.error { background: #3a1a1a; color: #e74c3c; border: 1px solid #e74c3c; }
</style>
</head>
<body>
<a class="back" href="/">← Retour</a>
<h1>🎬 Bibliothèque</h1>
<p class="subtitle">Gère tes clips vidéo et tes effets sonores</p>

<div id="msg" class="msg"></div>

<!-- CLIPS -->
<div class="section">
  <h2>Clips vidéo</h2>
  <div class="form-row">
    <input type="text" id="clip-name" placeholder="Nom du clip (ex: clip_acceleration_01)" />
  </div>
  <div class="form-row">
    <input type="text" id="clip-tags" placeholder="Tags séparés par des virgules (ex: vitesse, moteur, accélération)" />
  </div>
  <div class="form-row">
    <input type="file" id="clip-file" accept="video/mp4" />
    <button onclick="uploadClip()">+ Ajouter le clip</button>
  </div>
  <div id="clips-list" class="list"><p class="empty">Chargement...</p></div>
</div>

<!-- SONS -->
<div class="section">
  <h2>Effets sonores</h2>
  <div class="form-row">
    <input type="text" id="sound-name" placeholder="Nom du son (ex: intro_boom, whoosh_1)" />
    <select id="sound-type">
      <option value="intro">Son d'intro (début de vidéo)</option>
      <option value="whoosh">Whoosh (transition entre clips)</option>
    </select>
  </div>
  <div class="form-row">
    <input type="file" id="sound-file" accept="audio/*,video/mp4" />
    <button onclick="uploadSound()">+ Ajouter le son</button>
  </div>
  <div id="sounds-list" class="list"><p class="empty">Chargement...</p></div>
</div>

<script>
function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
}

async function loadClips() {
  const res = await fetch("/api/clips");
  const clips = await res.json();
  const el = document.getElementById("clips-list");
  if (!clips.length) { el.innerHTML = '<p class="empty">Aucun clip. Ajoutes-en un !</p>'; return; }
  el.innerHTML = clips.map(c => `
    <div class="item">
      <span class="name">${c.name}</span>
      <div class="tags">${(c.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}</div>
      <button class="danger" onclick="deleteClip('${c.id}')">Supprimer</button>
    </div>`).join("");
}

async function loadSounds() {
  const res = await fetch("/api/sounds");
  const sounds = await res.json();
  const el = document.getElementById("sounds-list");
  if (!sounds.length) { el.innerHTML = '<p class="empty">Aucun son. Ajoutes-en un !</p>'; return; }
  el.innerHTML = sounds.map(s => `
    <div class="item">
      <span class="name">${s.name}</span>
      <div class="tags"><span class="tag sound">${s.type === "intro" ? "Intro" : "Whoosh"}</span></div>
    </div>`).join("");
}

async function uploadClip() {
  const name = document.getElementById("clip-name").value.trim();
  const tags = document.getElementById("clip-tags").value.trim();
  const file = document.getElementById("clip-file").files[0];
  if (!name || !tags || !file) { showMsg("Remplis tous les champs !", "error"); return; }

  const fd = new FormData();
  fd.append("file", file);
  fd.append("name", name);
  fd.append("tags", tags);

  showMsg("Upload en cours...", "success");
  const res = await fetch("/api/clips", { method: "POST", body: fd });
  const data = await res.json();
  if (data.success) {
    showMsg(data.message, "success");
    document.getElementById("clip-name").value = "";
    document.getElementById("clip-tags").value = "";
    document.getElementById("clip-file").value = "";
    loadClips();
  } else {
    showMsg(data.error, "error");
  }
}

async function deleteClip(id) {
  if (!confirm("Supprimer ce clip ?")) return;
  await fetch("/api/clips/" + id, { method: "DELETE" });
  loadClips();
}

async function uploadSound() {
  const name = document.getElementById("sound-name").value.trim();
  const type = document.getElementById("sound-type").value;
  const file = document.getElementById("sound-file").files[0];
  if (!name || !file) { showMsg("Remplis tous les champs !", "error"); return; }

  const fd = new FormData();
  fd.append("file", file);
  fd.append("name", name);
  fd.append("type", type);

  showMsg("Upload en cours...", "success");
  const res = await fetch("/api/sounds", { method: "POST", body: fd });
  const data = await res.json();
  if (data.success) {
    showMsg("Son ajouté !", "success");
    document.getElementById("sound-name").value = "";
    document.getElementById("sound-file").value = "";
    loadSounds();
  } else {
    showMsg(data.error, "error");
  }
}

loadClips();
loadSounds();
</script>
</body>
</html>
