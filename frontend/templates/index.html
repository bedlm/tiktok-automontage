<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Auto-Montage</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
h1 { font-size: 2rem; margin-bottom: 0.5rem; }
p { color: #aaa; margin-bottom: 2rem; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; width: 100%; max-width: 700px; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; text-decoration: none; color: #fff; transition: border-color 0.2s; }
.card:hover { border-color: #1DB954; }
.card .icon { font-size: 2rem; margin-bottom: 0.75rem; }
.card h2 { font-size: 1.1rem; margin-bottom: 0.4rem; }
.card p { font-size: 0.85rem; color: #888; margin: 0; }
</style>
</head>
<body>
<h1>🛵 TikTok Auto-Montage</h1>
<p>Génère tes vidéos TikTok automatiquement</p>
<div class="cards">
  <a href="/bibliotheque" class="card">
    <div class="icon">🎬</div>
    <h2>Bibliothèque</h2>
    <p>Gérer tes clips et effets sonores</p>
  </a>
  <a href="/creer" class="card">
    <div class="icon">⚡</div>
    <h2>Créer une vidéo</h2>
    <p>Colle ton script et génère ta vidéo</p>
  </a>
</div>
</body>
</html>
